<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestión de Contactos</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">

    <!-- Favicon -->
    <link rel="icon" href="./assets/img/favicon.png">

</head>


<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                Gestión de Contactos
            </a>

        </div>

    </nav>

    <!-- Main -->

    <main class="container py-5">

        <div class="glass-card p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="fw-bold">
                    Tabla de Contactos
                </h2>

                <button
    class="btn btn-add"
    data-bs-toggle="modal"
    data-bs-target="#modalAgregar">

    <i class="bi bi-plus-circle-fill"></i>

    <span>
        Agregar Registro
    </span>

</button>

            </div>

            <div class="table-responsive">

                <table class="table align-middle text-center">

                    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Teléfono</th> <th>Email</th>    <th>Fecha</th>
        <th>Categoría</th>
        <th>Acciones</th>
    </tr>
</thead>

                    <tbody id="tablaContactos">

                    </tbody>

                </table>

            </div>

        </div>

    </main>

    <!-- Modal Agregar -->

   <div class="modal fade" id="modalAgregar">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-modal">
            <div class="modal-header">
                <h5 class="modal-title">Agregar Contacto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">
                <input type="text" id="apellido" class="form-control mb-3" placeholder="Apellido">
                
                <input type="tel" id="telefono" class="form-control mb-3" placeholder="Teléfono">
                <input type="email" id="email" class="form-control mb-3" placeholder="Correo Electrónico">
                
                <input type="date" id="fecha" class="form-control mb-3">
                
                <select id="categoria" class="form-select mb-3">
                    <option value="" disabled selected>Selecciona una categoría...</option>
                    <option value="1">Familia Cercana</option>
                    <option value="2">Familia</option>
                    <option value="3">Trabajo</option>
                    <option value="4">Escuela</option>
                    <option value="5">Amigos</option>
                    <option value="6">Clientes</option>
                    <option value="6">Porche</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" id="btnGuardar">Guardar</button>
            </div>
        </div>
    </div>
</div>

    <!-- Modal Editar -->

    <div class="modal fade" id="modalEditar">
        <div class="modal-dialog modal-dialog-centered"> 
            <div class="modal-content glass-modal modal-animate">
                <div class="modal-header">
                    <h5 class="modal-title">Actualizar Contacto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <input type="text" id="editNombre" class="form-control mb-3" placeholder="Nombre">
                    <input type="text" id="editApellido" class="form-control mb-3" placeholder="Apellido">
                    
                    <input type="tel" id="editTelefono" class="form-control mb-3" placeholder="Teléfono">
                    <input type="email" id="editEmail" class="form-control mb-3" placeholder="Correo Electrónico">
                    <input type="date" id="editFecha" class="form-control mb-3">
                    
                    <select id="editCategoria" class="form-select mb-3">
                        <option value="" disabled selected>Selecciona una categoría...</option>
                        <option value="1">Familia Cercana</option>
                        <option value="2">Familia</option>
                        <option value="3">Trabajo</option>
                        <option value="4">Escuela</option>
                        <option value="5">Amigos</option>
                        <option value="6">Clientes</option>
                        <option value="7">Otros</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-warning" id="btnActualizar">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEliminar">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content glass-modal modal-animate text-center p-4">
                <div class="modal-body">
                    <i class="bi bi-exclamation-triangle-fill text-warning d-block mb-3" style="font-size: 4rem;"></i>
                    <h4 class="fw-bold mb-3">¿Estás seguro?</h4>
                    <p class="text-white-50">¿Realmente deseas eliminar este contacto? Esta acción no se puede deshacer.</p>
                    <input type="hidden" id="deleteId">
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">Sí, eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalExito" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content glass-modal modal-animate text-center p-4">
                <div class="modal-body">
                    <i class="bi bi-check-circle-fill text-success d-block mb-3" style="font-size: 4rem;"></i>
                    <h5 class="fw-bold mb-0" id="exitoMensaje">¡Acción exitosa!</h5>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->

    <footer class="glass-footer text-center py-4 mt-5">

        <p class="mb-0">
            Desarrollado por Cristian Oliver © 2026
        </p>

    </footer>

    <!-- Bootstrap -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- App -->

    <script
        type="module"
        src="./assets/JS/app.js">
    </script>

</body>
</html>
